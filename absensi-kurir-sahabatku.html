<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
    <title>Master Admin Sahabatku Elite</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap');
        
        :root {
            --bg: #020617; --card: #0f172a; --text: #f1f5f9; --border: rgba(255,255,255,0.05); --sky: #00CAFF;
        }
        .light-mode {
            --bg: #f8fafc; --card: #ffffff; --text: #0f172a; --border: rgba(0,0,0,0.08);
        }

        body { background: var(--bg); color: var(--text); font-family: 'Plus Jakarta Sans', sans-serif; transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); }
        .glass { background: var(--card); border: 1px solid var(--border); border-radius: 24px; box-shadow: 0 10px 30px -10px rgba(0,0,0,0.5); }
        
        /* Approval Card */
        .approval-card { background: var(--card); border: 1px solid var(--border); border-radius: 28px; transition: all 0.3s ease; overflow: hidden; }
        .approval-card:hover { border-color: var(--sky); transform: translateY(-2px); box-shadow: 0 15px 30px -10px rgba(0,202,255,0.15); }
        .reason-box { background: rgba(255,255,255,0.03); border-radius: 16px; padding: 12px 16px; margin-top: 12px; border: 1px dashed rgba(255,255,255,0.1); }
        
        /* Nav Styling */
        .nav-tab.active { color: var(--sky); opacity: 1; position: relative; }
        .nav-tab.active::after { content: ''; position: absolute; bottom: 0; left: 25%; width: 50%; height: 4px; background: var(--sky); border-radius: 10px; box-shadow: 0 0 15px var(--sky); }
        .tab-content { display: none; }
        .tab-content.active { display: block; animation: slideUp 0.4s ease-out; }
        
        @keyframes slideUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }

        /* --- NEW INTERACTIVE CALENDAR STYLING --- */
        .calendar-container { background: var(--card); border-radius: 30px; border: 1px solid var(--border); padding: 20px; }
        .calendar-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 5px; }
        .day-head { font-size: 10px; font-weight: 800; opacity: 0.3; text-transform: uppercase; text-align: center; padding-bottom: 10px; }
        
        .day-cell { 
            aspect-ratio: 1/1; display: flex; flex-direction: column; align-items: center; justify-content: center; 
            border-radius: 12px; border: 1px solid transparent; transition: all 0.2s; cursor: pointer; position: relative;
            background: rgba(255,255,255,0.02);
        }
        .day-cell span { font-size: 13px; font-weight: 800; }
        .day-cell.selected { border-color: var(--sky); background: rgba(0, 202, 255, 0.15); transform: scale(0.95); }
        .current-day span { color: var(--sky); font-size: 16px; }

        /* Dots */
        .dot-container { display: flex; gap: 2px; position: absolute; bottom: 6px; }
        .dot { width: 4px; height: 4px; border-radius: 50%; }
        
        /* Badge Colors */
        .b-off { background: #f59e0b; } 
        .b-noOff { background: #10b981; } 
        .b-izin { background: #3b82f6; }
        .b-sakit { background: #6366f1; } 
        .b-tam { background: #ef4444; } 
        .b-tap { background: #a855f7; }

        /* Detail List */
        #day-detail-container { margin-top: 25px; animation: slideUp 0.3s ease-out; }
        .detail-item { 
            display: flex; align-items: center; justify-content: space-between; 
            padding: 14px 18px; border-radius: 20px; background: var(--card); 
            margin-bottom: 8px; border: 1px solid var(--border); 
        }

        .btn-reject { background: rgba(239, 68, 68, 0.1); color: #ef4444; border-radius: 18px; }
        .btn-approve { background: rgba(0, 202, 255, 0.1); color: var(--sky); border-radius: 18px; }
        select, input { background: var(--card) !important; color: var(--text) !important; border: 1px solid var(--border) !important; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
    </style>
</head>
<body class="p-4 max-w-4xl mx-auto pb-28">

    <header class="mb-8 flex justify-between items-center sticky top-0 z-[100] py-4 bg-[var(--bg)]">
        <div>
            <h1 class="text-2xl font-black text-[var(--sky)] tracking-tighter uppercase">Elite Admin</h1>
            <p class="text-[9px] opacity-40 font-bold tracking-[0.3em]">SAHABATKU GRUP V.6</p>
        </div>
        <div class="flex gap-3">
            <button onclick="toggleTheme()" class="w-12 h-12 glass flex items-center justify-center text-amber-500">
                <i class="fa-solid fa-moon text-lg"></i>
            </button>
            <button onclick="location.reload()" class="w-12 h-12 glass flex items-center justify-center text-[var(--sky)]">
                <i class="fa-solid fa-arrows-rotate text-lg"></i>
            </button>
        </div>
    </header>

    <nav class="flex overflow-x-auto no-scrollbar gap-8 mb-8 border-b border-white/5 px-4 whitespace-nowrap sticky top-20 bg-[var(--bg)] z-[90]">
        <button onclick="switchTab('approval')" id="btn-tab-approval" class="nav-tab active pb-4 text-[11px] font-black uppercase tracking-widest">Approval</button>
        <button onclick="switchTab('setting')" id="btn-tab-setting" class="nav-tab pb-4 text-[11px] font-black uppercase tracking-widest opacity-40">Input Absen</button>
        <button onclick="switchTab('calendar')" id="btn-tab-calendar" class="nav-tab pb-4 text-[11px] font-black uppercase tracking-widest opacity-40">Kalender</button>
        <button onclick="switchTab('recap')" id="btn-tab-recap" class="nav-tab pb-4 text-[11px] font-black uppercase tracking-widest opacity-40">Rekap</button>
    </nav>

    <section id="tab-approval" class="tab-content active">
        <div id="loading" class="flex flex-col items-center py-20 opacity-30 animate-pulse">
            <i class="fa-solid fa-spinner fa-spin text-4xl mb-4 text-[var(--sky)]"></i>
            <span class="font-black tracking-[0.3em] text-[10px]">MENYINKRONKAN DATA...</span>
        </div>
        <div id="list-pending" class="space-y-6"></div>
    </section>

    <section id="tab-setting" class="tab-content">
        <div class="glass p-8 space-y-6">
            <div class="space-y-1">
                <h2 class="text-lg font-black text-[var(--sky)]">Manual Input Pelanggaran</h2>
                <p class="text-[10px] opacity-50 font-bold uppercase">Data langsung ke database</p>
            </div>
            <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                <div><label class="text-[10px] font-black opacity-30 uppercase ml-1">Kategori</label>
                    <select id="mJenis" class="w-full mt-2 p-5 rounded-2xl text-sm font-bold outline-none">
                        <option value="noMasuk">TANPA ABSEN MASUK (TAM)</option>
                        <option value="noPulang">TANPA ABSEN PULANG (TAP)</option>
                        <option value="off">TUKAR OFF (MANUAL)</option>
                        <option value="noOff">TIDAK AMBIL OFF (MANUAL)</option>
                        <option value="izin">IZIN (MANUAL)</option>
                        <option value="sakit">SAKIT (MANUAL)</option>
                    </select>
                </div>
                <div><label class="text-[10px] font-black opacity-30 uppercase ml-1">Nama Kurir</label>
                    <select id="mNama" class="w-full mt-2 p-5 rounded-2xl text-sm font-bold outline-none"></select>
                </div>
                <div><label class="text-[10px] font-black opacity-30 uppercase ml-1">Tanggal</label>
                    <input type="date" id="mTgl" class="w-full mt-2 p-5 rounded-2xl text-sm font-bold outline-none">
                </div>
                <div><label class="text-[10px] font-black opacity-30 uppercase ml-1">Keterangan</label>
                    <input type="text" id="mKet" placeholder="Alasan..." class="w-full mt-2 p-5 rounded-2xl text-sm font-bold outline-none">
                </div>
            </div>
            <button onclick="submitManual()" id="btnManual" class="w-full bg-[var(--sky)] text-white py-5 rounded-2xl font-black shadow-2xl shadow-sky-500/40 uppercase text-xs tracking-[0.2em]">Update Database</button>
        </div>
    </section>

    <section id="tab-calendar" class="tab-content">
        <div class="calendar-container">
            <div class="flex justify-between items-center mb-6">
                <h2 id="currentMonthLabel" class="font-black uppercase text-sm tracking-widest text-[var(--sky)]">MEI 2026</h2>
                <div class="text-[8px] font-bold opacity-30 uppercase">Klik Tanggal Untuk Detail</div>
            </div>
            <div class="calendar-grid">
                <div class="day-head">Min</div><div class="day-head">Sen</div><div class="day-head">Sel</div>
                <div class="day-head">Rab</div><div class="day-head">Kam</div><div class="day-head">Jum</div><div class="day-head">Sab</div>
            </div>
            <div id="calendar-body" class="calendar-grid"></div>
        </div>

        <div id="day-detail-container">
            <div class="flex items-center gap-3 mb-4 px-2">
                <div class="w-1 h-6 bg-[var(--sky)] rounded-full"></div>
                <h3 class="font-black uppercase text-xs tracking-widest">Detail Personel</h3>
            </div>
            <div id="detail-content" class="space-y-2">
                <div class="text-center py-10 opacity-30 text-[10px] font-bold">PILIH TANGGAL UNTUK MELIHAT STATUS TIM</div>
            </div>
        </div>
    </section>

    <section id="tab-recap" class="tab-content">
        <div class="glass overflow-hidden overflow-x-auto">
            <table class="w-full text-left text-[11px]">
                <thead class="bg-white/5 font-black uppercase text-[9px] tracking-widest">
                    <tr>
                        <th class="p-5 text-[var(--sky)]">PERSONEL</th>
                        <th class="p-5 text-center">OFF</th>
                        <th class="p-5 text-center text-emerald-500">N-OFF</th>
                        <th class="p-5 text-center text-blue-500">IZIN</th>
                        <th class="p-5 text-center text-red-500">TAM</th>
                        <th class="p-5 text-center text-purple-500">TAP</th>
                    </tr>
                </thead>
                <tbody id="recap-body" class="divide-y divide-white/5"></tbody>
            </table>
        </div>
    </section>

    <script>
        const API_URL = "https://script.google.com/macros/s/AKfycbz2gHikiFQ2qUI5Y6Nw_ISKQOzkFfGrvmIlSLONcqOR6QGtXg8crEqG7wpDQpuHXyKa6A/exec";
        let store = { kurir: [], jadwal: [] };

        function toggleTheme() {
            const isLight = document.body.classList.toggle('light-mode');
            localStorage.setItem('eliteTheme', isLight ? 'light' : 'dark');
        }

        function switchTab(tab) {
            document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
            document.querySelectorAll('.nav-tab').forEach(b => {
                b.classList.remove('active'); b.classList.add('opacity-40');
            });
            document.getElementById('tab-' + tab).classList.add('active');
            document.getElementById('btn-tab-' + tab).classList.add('active');
            document.getElementById('btn-tab-' + tab).classList.remove('opacity-40');
            if(tab === 'calendar') renderCalendar();
            if(tab === 'recap') renderRecap();
        }

        async function init() {
            if (localStorage.getItem('eliteTheme') === 'light') toggleTheme();
            try {
                const res = await fetch(API_URL + "?action=get");
                store = await res.json();
                document.getElementById('mNama').innerHTML = store.kurir.sort().map(n => `<option value="${n}">${n.toUpperCase()}</option>`).join('');
                loadPending();
            } catch (e) { console.error("Database Link Error"); }
        }

        async function loadPending() {
            try {
                const res = await fetch(API_URL + "?action=getAdmin");
                const data = await res.json();
                document.getElementById('loading').style.display = 'none';
                const list = document.getElementById('list-pending');
                if (data.length === 0) {
                    list.innerHTML = `<div class="glass p-20 text-center opacity-10 font-black tracking-[1em]">CLEAN</div>`;
                    return;
                }
                list.innerHTML = '';
                data.forEach(item => {
                    let badgeColor = "bg-amber-500/20 text-amber-500";
                    if(item.jenis.toUpperCase().includes('BATAL')) badgeColor = "bg-emerald-500/20 text-emerald-500";
                    if(item.jenis.toUpperCase().includes('IZIN')) badgeColor = "bg-blue-500/20 text-blue-500";

                    list.innerHTML += `
                        <div class="approval-card p-6">
                            <div class="flex justify-between items-start mb-4">
                                <div>
                                    <span class="text-[9px] font-black px-3 py-1.5 rounded-lg ${badgeColor} uppercase tracking-widest">${item.jenis}</span>
                                    <h3 class="text-xl font-extrabold uppercase mt-3 tracking-tight">${item.nama}</h3>
                                    <p class="text-[10px] opacity-40 font-bold mt-1"><i class="fa-solid fa-clock mr-1"></i> ${item.tgl}</p>
                                </div>
                                <div class="text-right">
                                    <p class="text-[9px] font-black opacity-20 uppercase tracking-widest">Row ID</p>
                                    <p class="text-[10px] font-bold">#${item.row}</p>
                                </div>
                            </div>
                            <div class="reason-box">
                                <p class="text-[9px] font-black opacity-30 uppercase tracking-widest mb-1">Keterangan:</p>
                                <p class="text-xs font-semibold">${item.ket || "-"}</p>
                            </div>
                            <div class="grid grid-cols-2 gap-4 mt-6">
                                <button onclick="approve(${item.row}, 'Reject')" class="btn-reject h-14 flex items-center justify-center gap-3 font-black text-[10px] uppercase">REJECT</button>
                                <button onclick="approve(${item.row}, 'Approve')" class="btn-approve h-14 flex items-center justify-center gap-3 font-black text-[10px] uppercase">APPROVE</button>
                            </div>
                        </div>`;
                });
            } catch (e) { console.error("Load Pending Error"); }
        }

        async function approve(row, action) {
            Swal.fire({ title: 'Processing...', allowOutsideClick: false, didOpen: () => Swal.showLoading() });
            const res = await fetch(API_URL, { method: 'POST', body: JSON.stringify({ action: "admin_process", row: row, decision: action }) });
            const data = await res.json();
            if(data.status === "success") location.reload();
        }

        async function submitManual() {
            const payload = {
                action: "submit_admin",
                jenis: document.getElementById('mJenis').value,
                nama: document.getElementById('mNama').value,
                tgl: document.getElementById('mTgl').value,
                ket: "[ADMIN] " + (document.getElementById('mKet').value || "Manual Update")
            };
            if(!payload.tgl) return Swal.fire('Error', 'Pilih Tanggal!', 'error');
            const res = await fetch(API_URL, { method: 'POST', body: JSON.stringify(payload) });
            const data = await res.json();
            if(data.status === "success") location.reload();
        }

        // --- NEW CALENDAR LOGIC ---
        function renderCalendar() {
            const body = document.getElementById('calendar-body');
            body.innerHTML = '';
            const now = new Date();
            const daysInMonth = new Date(now.getFullYear(), now.getMonth() + 1, 0).getDate();
            const firstDay = new Date(now.getFullYear(), now.getMonth(), 1).getDay();

            document.getElementById('currentMonthLabel').innerText = now.toLocaleString('id-ID', { month: 'long', year: 'numeric' });

            for(let i=0; i<firstDay; i++) body.innerHTML += '<div></div>';

            for(let d=1; d<=daysInMonth; d++) {
                const data = store.jadwal[d-1] || {};
                const isToday = d === now.getDate();
                
                let dots = '';
                if(data.off) dots += '<div class="dot b-off"></div>';
                if(data.izin || data.sakit) dots += '<div class="dot b-izin"></div>';
                if(data.noMasuk || data.noPulang) dots += '<div class="dot b-tam"></div>';

                const cell = document.createElement('div');
                cell.className = `day-cell ${isToday ? 'current-day' : ''}`;
                cell.innerHTML = `<span>${d}</span><div class="dot-container">${dots}</div>`;
                cell.onclick = () => showDayDetail(d);
                body.appendChild(cell);
            }
            showDayDetail(now.getDate());
        }

        function showDayDetail(day) {
            document.querySelectorAll('.day-cell').forEach(c => c.classList.remove('selected'));
            const cells = document.querySelectorAll('.day-cell');
            cells.forEach(c => { if(c.innerText == day) c.classList.add('selected'); });

            const data = store.jadwal[day-1] || {};
            const content = document.getElementById('detail-content');
            
            const createList = (names, label, cls) => {
                if(!names || names === "null" || names === "") return '';
                return names.split(',').map(name => `
                    <div class="detail-item">
                        <div class="flex flex-col">
                            <span class="text-[12px] font-black uppercase tracking-tight">${name.trim()}</span>
                            <span class="text-[8px] font-bold opacity-40">TANGGAL: ${day} MEI</span>
                        </div>
                        <span class="text-[8px] font-black px-3 py-1.5 rounded-full ${cls} text-white uppercase">${label}</span>
                    </div>
                `).join('');
            };

            let html = '';
            html += createList(data.off, 'OFF', 'b-off');
            html += createList(data.noOff, 'MASUK (N-OFF)', 'b-noOff');
            html += createList(data.izin, 'IZIN', 'b-izin');
            html += createList(data.sakit, 'SAKIT', 'b-sakit');
            html += createList(data.noMasuk, 'TAM (Tanpa Masuk)', 'b-tam');
            html += createList(data.noPulang, 'TAP (Tanpa Pulang)', 'b-tap');

            content.innerHTML = html || `<div class="py-10 opacity-20 text-center font-black text-[10px]">TIDAK ADA REKAM DATA</div>`;
        }

        function renderRecap() {
            const body = document.getElementById('recap-body');
            body.innerHTML = '';
            store.kurir.sort().forEach(nama => {
                let s = { off: 0, nOff: 0, iz: 0, sk: 0, tam: 0, tap: 0 };
                const nU = nama.toUpperCase().trim();
                store.jadwal.forEach(r => {
                    const check = (v) => v?.toUpperCase().split(',').map(x => x.trim()).includes(nU);
                    if (check(r.off)) s.off++;
                    if (check(r.noOff)) s.nOff++;
                    if (check(r.izin)) s.iz++;
                    if (check(r.sakit)) s.sk++;
                    if (check(r.noMasuk)) s.tam++;
                    if (check(r.noPulang)) s.tap++;
                });
                body.innerHTML += `
                    <tr>
                        <td class="p-5 font-black uppercase">${nama}</td>
                        <td class="p-5 text-center font-bold text-amber-500">${s.off}</td>
                        <td class="p-5 text-center font-bold text-emerald-500">${s.nOff}</td>
                        <td class="p-5 text-center font-bold text-blue-500">${s.iz + s.sk}</td>
                        <td class="p-5 text-center font-bold text-red-500">${s.tam}</td>
                        <td class="p-5 text-center font-bold text-purple-500">${s.tap}</td>
                    </tr>`;
            });
        }

        window.onload = init;
    </script>
</body>
</html>
