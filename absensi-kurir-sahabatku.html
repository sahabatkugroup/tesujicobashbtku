<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
    <title>Master Admin Sahabatku</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap');
        
        :root {
            --bg: #020617; --card: #0f172a; --text: #f1f5f9; --border: rgba(255,255,255,0.05); --sky: #00CAFF;
        }
        .light-mode {
            --bg: #f8fafc; --card: #ffffff; --text: #0f172a; --border: rgba(0,0,0,0.08);
        }

        body { background: var(--bg); color: var(--text); font-family: 'Plus Jakarta Sans', sans-serif; transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); }
        .glass { background: var(--card); border: 1px solid var(--border); border-radius: 24px; box-shadow: 0 10px 30px -10px rgba(0,0,0,0.5); }
        .nav-tab.active { color: var(--sky); opacity: 1; position: relative; }
        .nav-tab.active::after { content: ''; position: absolute; bottom: 0; left: 25%; width: 50%; height: 4px; background: var(--sky); border-radius: 10px; box-shadow: 0 0 15px var(--sky); }
        .tab-content { display: none; }
        .tab-content.active { display: block; animation: slideUp 0.4s ease-out; }
        
        @keyframes slideUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
        
        /* Kalender Styling */
        .calendar-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 8px; }
        .day-box { min-height: 110px; padding: 8px; border-radius: 16px; border: 1px solid var(--border); background: var(--card); font-size: 10px; transition: all 0.2s; }
        .day-box:active { transform: scale(0.95); }
        .current-day { border: 2px solid var(--sky) !important; box-shadow: 0 0 15px rgba(0,202,255,0.2); }

        /* Badge Styling */
        .b-item { padding: 3px 6px; border-radius: 6px; font-weight: 800; font-size: 7px; margin-top: 3px; display: block; text-align: center; color: #fff; text-transform: uppercase; }
        .b-off { background: #f59e0b; } .b-noOff { background: #10b981; } .b-izin { background: #3b82f6; }
        .b-sakit { background: #6366f1; } .b-tam { background: #ef4444; } .b-tap { background: #a855f7; }

        select, input { background: var(--card) !important; color: var(--text) !important; border: 1px solid var(--border) !important; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
    </style>
</head>
<body class="p-4 max-w-4xl mx-auto pb-28">

    <header class="mb-8 flex justify-between items-center sticky top-0 z-[100] py-4 bg-[var(--bg)]">
        <div>
            <h1 class="text-2xl font-black text-[var(--sky)] tracking-tighter">ELITE ADMIN</h1>
            <p class="text-[9px] opacity-40 font-bold tracking-[0.3em]">SAHABATKU GRUP V.5</p>
        </div>
        <div class="flex gap-3">
            <button onclick="toggleTheme()" class="w-12 h-12 glass flex items-center justify-center text-amber-500 active:scale-90 transition-all">
                <i class="fa-solid fa-moon text-lg"></i>
            </button>
            <button onclick="location.reload()" class="w-12 h-12 glass flex items-center justify-center text-[var(--sky)] active:rotate-180 transition-all duration-500">
                <i class="fa-solid fa-arrows-rotate text-lg"></i>
            </button>
        </div>
    </header>

    <nav class="flex overflow-x-auto no-scrollbar gap-8 mb-8 border-b border-white/5 px-4 whitespace-nowrap sticky top-20 bg-[var(--bg)] z-[90]">
        <button onclick="switchTab('approval')" id="btn-tab-approval" class="nav-tab active pb-4 text-[11px] font-black uppercase tracking-widest">Approval</button>
        <button onclick="switchTab('setting')" id="btn-tab-setting" class="nav-tab pb-4 text-[11px] font-black uppercase tracking-widest opacity-40">Input Absen</button>
        <button onclick="switchTab('calendar')" id="btn-tab-calendar" class="nav-tab pb-4 text-[11px] font-black uppercase tracking-widest opacity-40">Kalender</button>
        <button onclick="switchTab('recap')" id="btn-tab-recap" class="nav-tab pb-4 text-[11px] font-black uppercase tracking-widest opacity-40">Rekap</button>
    </nav>

    <section id="tab-approval" class="tab-content active">
        <div id="loading" class="text-center py-20 opacity-30 font-black animate-pulse">MENYINKRONKAN DATABASE...</div>
        <div id="list-pending" class="space-y-4"></div>
    </section>

    <section id="tab-setting" class="tab-content">
        <div class="glass p-8 space-y-6">
            <div class="space-y-1">
                <h2 class="text-lg font-black text-[var(--sky)]">Manual Input Pelanggaran</h2>
                <p class="text-[10px] opacity-50 font-bold uppercase">Data akan langsung masuk ke database tanpa antrean</p>
            </div>
            <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                <div>
                    <label class="text-[10px] font-black opacity-30 uppercase ml-1">Kategori Laporan</label>
                    <select id="mJenis" class="w-full mt-2 p-5 rounded-2xl text-sm font-bold outline-none focus:ring-2 focus:ring-[var(--sky)] transition-all">
                        <option value="noMasuk">TANPA ABSEN MASUK (TAM)</option>
                        <option value="noPulang">TANPA ABSEN PULANG (TAP)</option>
                        <option value="off">TUKAR OFF (MANUAL)</option>
                        <option value="noOff">TIDAK AMBIL OFF (MANUAL)</option>
                        <option value="izin">IZIN (MANUAL)</option>
                        <option value="sakit">SAKIT (MANUAL)</option>
                    </select>
                </div>
                <div>
                    <label class="text-[10px] font-black opacity-30 uppercase ml-1">Nama Kurir</label>
                    <select id="mNama" class="w-full mt-2 p-5 rounded-2xl text-sm font-bold outline-none"></select>
                </div>
                <div>
                    <label class="text-[10px] font-black opacity-30 uppercase ml-1">Tanggal Berlaku</label>
                    <input type="date" id="mTgl" class="w-full mt-2 p-5 rounded-2xl text-sm font-bold outline-none">
                </div>
                <div>
                    <label class="text-[10px] font-black opacity-30 uppercase ml-1">Keterangan Tambahan</label>
                    <input type="text" id="mKet" placeholder="Contoh: Lupa scan QR atau izin via WA" class="w-full mt-2 p-5 rounded-2xl text-sm font-bold outline-none">
                </div>
            </div>
            <button onclick="submitManual()" id="btnManual" class="w-full bg-[var(--sky)] text-white py-5 rounded-2xl font-black shadow-2xl shadow-sky-500/40 active:scale-95 transition-all uppercase text-xs tracking-[0.2em] mt-4">
                Update Database Sekarang
            </button>
        </div>
    </section>

    <section id="tab-calendar" class="tab-content">
        <div class="glass p-6 overflow-hidden">
            <div class="flex justify-between items-center mb-8 px-2">
                <h2 id="monthLabel" class="font-black uppercase text-sm tracking-tighter">Tim Monitor</h2>
                <div class="flex gap-2 text-[8px] font-black uppercase">
                    <span class="px-2 py-1 b-tam rounded">TAM</span>
                    <span class="px-2 py-1 b-tap rounded">TAP</span>
                </div>
            </div>
            <div class="calendar-grid mb-4 text-center text-[9px] font-black opacity-20 uppercase">
                <div>Min</div><div>Sen</div><div>Sel</div><div>Rab</div><div>Kam</div><div>Jum</div><div>Sab</div>
            </div>
            <div id="calendar-body" class="calendar-grid"></div>
        </div>
    </section>

    <section id="tab-recap" class="tab-content">
        <div class="glass overflow-hidden overflow-x-auto">
            <table class="w-full text-left text-[11px]">
                <thead class="bg-white/5 font-black uppercase text-[9px] tracking-widest">
                    <tr>
                        <th class="p-5 text-[var(--sky)]">PERSONEL</th>
                        <th class="p-5 text-center">OFF</th>
                        <th class="p-5 text-center text-emerald-500">N-OFF</th>
                        <th class="p-5 text-center text-blue-500">IZIN</th>
                        <th class="p-5 text-center text-red-500">TAM</th>
                        <th class="p-5 text-center text-purple-500">TAP</th>
                    </tr>
                </thead>
                <tbody id="recap-body" class="divide-y divide-white/5"></tbody>
            </table>
        </div>
    </section>

    <script>
        const API_URL = "https://script.google.com/macros/s/AKfycbz2gHikiFQ2qUI5Y6Nw_ISKQOzkFfGrvmIlSLONcqOR6QGtXg8crEqG7wpDQpuHXyKa6A/exec";
        let store = { kurir: [], jadwal: [] };

        // THEME ENGINE
        function toggleTheme() {
            const isLight = document.body.classList.toggle('light-mode');
            localStorage.setItem('eliteTheme', isLight ? 'light' : 'dark');
            const icon = document.querySelector('.fa-moon');
            icon.className = isLight ? 'fa-solid fa-sun text-lg' : 'fa-solid fa-moon text-lg';
        }

        // TAB ENGINE
        function switchTab(tab) {
            document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
            document.querySelectorAll('.nav-tab').forEach(b => {
                b.classList.remove('active'); b.classList.add('opacity-40');
            });
            document.getElementById('tab-' + tab).classList.add('active');
            document.getElementById('btn-tab-' + tab).classList.add('active');
            document.getElementById('btn-tab-' + tab).classList.remove('opacity-40');
            if(tab === 'calendar') renderCalendar();
            if(tab === 'recap') renderRecap();
        }

        async function init() {
            if (localStorage.getItem('eliteTheme') === 'light') toggleTheme();
            try {
                const res = await fetch(API_URL + "?action=get");
                store = await res.json();
                document.getElementById('mNama').innerHTML = store.kurir.sort().map(n => `<option value="${n}">${n.toUpperCase()}</option>`).join('');
                loadPending();
            } catch (e) { console.error("Database Link Error"); }
        }

        async function loadPending() {
            const res = await fetch(API_URL + "?action=getAdmin");
            const data = await res.json();
            document.getElementById('loading').style.display = 'none';
            const list = document.getElementById('list-pending');
            list.innerHTML = data.length ? '' : `<div class="glass p-20 text-center opacity-10 font-black tracking-[1em]">CLEAN</div>`;

            data.forEach(item => {
                const isBatal = item.jenis.toUpperCase().includes('BATAL');
                list.innerHTML += `
                    <div class="glass p-6 flex justify-between items-center border-l-8 ${isBatal ? 'border-emerald-500' : 'border-amber-500'} animate-slideUp">
                        <div>
                            <span class="text-[8px] font-black px-3 py-1.5 rounded-lg bg-white/5 uppercase tracking-widest">${item.jenis}</span>
                            <h3 class="font-black uppercase mt-2 text-base tracking-tight">${item.nama}</h3>
                            <p class="text-[10px] opacity-40 font-bold"><i class="fa-solid fa-clock mr-1"></i> ${item.tgl}</p>
                        </div>
                        <div class="flex gap-4">
                            <button onclick="approve(${item.row}, 'Reject')" class="w-14 h-14 glass text-red-500 active:scale-90 transition-all flex items-center justify-center"><i class="fa-solid fa-xmark text-xl"></i></button>
                            <button onclick="approve(${item.row}, 'Approve')" class="w-14 h-14 glass text-[var(--sky)] active:scale-90 transition-all flex items-center justify-center"><i class="fa-solid fa-check text-xl"></i></button>
                        </div>
                    </div>`;
            });
        }

        async function approve(row, action) {
            Swal.fire({ title: 'Processing...', allowOutsideClick: false, didOpen: () => Swal.showLoading() });
            const res = await fetch(API_URL, { method: 'POST', body: JSON.stringify({ action: "admin_process", row: row, decision: action }) });
            const data = await res.json();
            if(data.status === "success") {
                Swal.fire({ icon: 'success', title: 'Updated', showConfirmButton: false, timer: 800 }).then(() => location.reload());
            }
        }

        async function submitManual() {
            const payload = {
                action: "submit_admin",
                jenis: document.getElementById('mJenis').value,
                nama: document.getElementById('mNama').value,
                tgl: document.getElementById('mTgl').value,
                ket: "[ADMIN] " + (document.getElementById('mKet').value || "Manual Update")
            };
            if(!payload.tgl) return Swal.fire('Error', 'Pilih Tanggal Berlaku!', 'error');
            
            const btn = document.getElementById('btnManual');
            btn.disabled = true; btn.innerHTML = 'WRITING TO DATABASE...';

            const res = await fetch(API_URL, { method: 'POST', body: JSON.stringify(payload) });
            const data = await res.json();
            if(data.status === "success") {
                Swal.fire({ icon: 'success', title: 'Data Pushed', showConfirmButton: false, timer: 800 }).then(() => location.reload());
            }
        }

        function renderCalendar() {
            const body = document.getElementById('calendar-body');
            body.innerHTML = '';
            const now = new Date();
            const daysInMonth = new Date(now.getFullYear(), now.getMonth() + 1, 0).getDate();
            const firstDay = new Date(now.getFullYear(), now.getMonth(), 1).getDay();

            for(let i=0; i<firstDay; i++) body.innerHTML += '<div></div>';

            for(let d=1; d<=daysInMonth; d++) {
                const dayData = store.jadwal[d-1] || {};
                let badges = '';
                const parse = (str, cls) => {
                    if(!str || str === "" || str === "null") return '';
                    return str.split(',').map(n => `<span class="b-item ${cls}">${n.trim().split(' ')[0]}</span>`).join('');
                };

                badges += parse(dayData.off, 'b-off');
                badges += parse(dayData.noOff, 'b-noOff');
                badges += parse(dayData.izin, 'b-izin');
                badges += parse(dayData.sakit, 'b-sakit');
                badges += parse(dayData.noMasuk, 'b-tam');
                badges += parse(dayData.noPulang, 'b-tap');

                body.innerHTML += `
                    <div class="day-box ${d === now.getDate() ? 'current-day' : ''}">
                        <div class="font-black opacity-30">${d}</div>
                        <div class="mt-1">${badges}</div>
                    </div>`;
            }
        }

        function renderRecap() {
            const body = document.getElementById('recap-body');
            body.innerHTML = '';
            store.kurir.sort().forEach(nama => {
                let s = { off: 0, nOff: 0, iz: 0, sk: 0, tam: 0, tap: 0 };
                const nU = nama.toUpperCase().trim();

                store.jadwal.forEach(r => {
                    const check = (v) => v?.toUpperCase().split(',').map(x => x.trim()).includes(nU);
                    if (check(r.off)) s.off++;
                    if (check(r.noOff)) s.nOff++;
                    if (check(r.izin)) s.iz++;
                    if (check(r.sakit)) s.sk++;
                    if (check(r.noMasuk)) s.tam++;
                    if (check(r.noPulang)) s.tap++;
                });

                body.innerHTML += `
                    <tr class="hover:bg-white/5 transition-all">
                        <td class="p-5 font-black uppercase tracking-tighter">${nama}</td>
                        <td class="p-5 text-center font-bold text-amber-500">${s.off}</td>
                        <td class="p-5 text-center font-bold text-emerald-500">${s.nOff}</td>
                        <td class="p-5 text-center font-bold text-blue-500">${s.iz + s.sk}</td>
                        <td class="p-5 text-center font-bold text-red-500">${s.tam}</td>
                        <td class="p-5 text-center font-bold text-purple-500">${s.tap}</td>
                    </tr>`;
            });
        }

        window.onload = init;
    </script>
</body>
</html>
